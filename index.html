<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<main class="container">

  <aside class="branding">
    <div class="content">
      <h2 class="logo">○ circles</h2>

      <h1>Faça login <br> na sua conta</h1>
      <p>Vamos fazer o círculo maior!</p>
    </div>
  </aside>


  <section class="login">
    <form class="form">
      <label>Email</label>
      <input type="email" placeholder="name@example.com">

      <label>Senha</label>
          <div class="password-box">
            <input type="password" placeholder="••••••" />
          </div>

      <div class="options">
        <span>Não tem uma conta? <a href="#">cadastrar-se</a></span>
      </div>
      <div><button type="enviar">Login</button></div>
    </form>
  </section>

</main>

</body>
</html>
