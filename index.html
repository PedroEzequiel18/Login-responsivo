<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
><link rel="stylesheet" href="Layout.css/cadastro.css" />

  </head>

  <body>
    <main>

      <aside>
        <h1></h1>
        <p>Bem-vindo de volta! Faça login formulário</p>
      </aside>

      <section>
        <form>
            
          <h2>Entrar</h2>
          <div>
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div>
            <label for="password">Senha</label>
            <input
              type="password"
              id="password"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <button type="submit">Entrar</button>
          
             <div>
            <a href="Recuperar senha">Esqueci minha senha</a>
          </div>
          
    
          <button type="submit">Entrar</button>
        </form>
      </section>
    </main>
  </body>
</html>
